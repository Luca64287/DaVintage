<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaVintage - Your Vintage Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2b2b2b;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
        }

        .search-bar input {
            padding: 5px;
            font-size: 14px;
        }

        .search-bar button {
            padding: 6px;
            font-size: 14px;
            background-color: #d4a373;
            color: white;
            border: none;
            cursor: pointer;
        }

        .search-bar button:hover {
            background-color: #c58f4f;
        }

        main {
            padding: 20px;
        }

        h1 {
            color: #2b2b2b;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .category-card {
            text-align: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            background-color: #f4f4f4;
            transform: scale(1.05);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <h1>DaVintage</h1>
        <div class="search-bar">
            <input type="text" placeholder="Search for brands, items...">
            <button>Search</button>
        </div>
    </header>

    <main>
        <h2>Our Brands & Labels</h2>
        <div class="categories">
            <div class="category-card">Levi's</div>
            <div class="category-card">Adidas</div>
            <div class="category-card">Nike</div>
            <div class="category-card">Tommy Hilfiger</div>
            <div class="category-card">Dr. Martens</div>
            <div class="category-card">Ralph Lauren</div>
            <div class="category-card">Vintage Gucci</div>
            <div class="category-card">Wrangler</div>
        </div>
    </main>
</body>

</html>
